# Server Port
server.port=8080

# Application Name
spring.application.name=enterprise-fitness-app

# Database Connection (PostgreSQL via Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/fitness_db
spring.datasource.username=admin
spring.datasource.password=Raj@3395
